<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="src/css/styles.css">
    <title>E-Commerce</title>
</head>
<body>

    <header class="header">
        <h1 class="logo">E-Commerce</h1>

        <div class="btns">  
                <!--<button id="carrinho">🛒</button>-->
            <button onClick="window.location.href='login.html'">Login</button>
        </div>
    </header>

    <main>
        <section class="home-main">
            <div class="stores">
                <div class="produtos">
                    <div class="produto"></div>
                </div>
            </div>
        </section>
    </main>

    <!--pop de aviso que precisa de login para adicionar itens ao carrinho-->
    <div id="needLoginPopup" class="overlay">
        <div class="needLogin">
            <h1>Login Necessário</h1>
            <button id="closeNeedLoginPopup" class="close-btn"><i class="fas fa-times"></i></button>
            <h2>Você precisa estar logado para adicionar itens ao carrinho.</h2>
            <button onClick="window.location.href='login.html'">Login</button>
        </div>
    </div>

    <script src="src/js/home.js"></script>
</body>
</html>
